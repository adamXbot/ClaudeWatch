name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read         # least privilege by default; release job opts up

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # let build.sh derive a version from tags/history

      - name: Toolchain
        run: |
          swift --version
          xcodebuild -version
          echo "Developer dir: $(xcode-select -p)"

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Assemble .app
        run: ./build.sh release

      - name: Zip unsigned artifact
        run: ditto -c -k --keepParent ClaudeWatch.app ClaudeWatch-unsigned.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeWatch-app-unsigned
          path: ClaudeWatch-unsigned.zip
          if-no-files-found: error

  release:
    name: Sign, notarize & release
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write    # only this job publishes a Release
    env:
      # Code-signing identity, e.g. "Developer ID Application: Your Name (TEAMID)"
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
      # App Store Connect API key for notarytool (.p8 stored base64-encoded)
      AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
      AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
      AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
      # Sparkle EdDSA private key (PEM/base64 from generate_keys) for signing updates
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build & assemble app
        env:
          CLAUDEWATCH_VERSION: ${{ github.ref_name }}
        run: ./build.sh release

      - name: Sign & notarize
        run: |
          set -euo pipefail   # NOTE: never `set -x` here — it would leak secrets

          if [ -z "${MACOS_CERTIFICATE:-}" ] || [ -z "${MACOS_SIGN_IDENTITY:-}" ]; then
            echo "::warning::MACOS_CERTIFICATE / MACOS_SIGN_IDENTITY not set — publishing an UNSIGNED build. See RELEASING.md."
            echo "SIGNED=no" >> "$GITHUB_ENV"
            exit 0
          fi

          # --- import the Developer ID cert into an ephemeral keychain ---
          CERT="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo -n "$MACOS_CERTIFICATE" | base64 -D > "$CERT"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import "$CERT" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$CERT"

          # --- codesign (Developer ID, hardened runtime, secure timestamp) ---
          # Re-sign Sparkle's nested code inside-out before the app, so notarization
          # accepts everything under our identity.
          FW="ClaudeWatch.app/Contents/Frameworks/Sparkle.framework"
          if [ -d "$FW" ]; then
            for item in \
              "$FW/Versions/B/XPCServices/Downloader.xpc" \
              "$FW/Versions/B/XPCServices/Installer.xpc" \
              "$FW/Versions/B/Updater.app" \
              "$FW/Versions/B/Autoupdate" ; do
              [ -e "$item" ] && codesign --force --options runtime --timestamp --sign "$MACOS_SIGN_IDENTITY" "$item"
            done
            codesign --force --options runtime --timestamp --sign "$MACOS_SIGN_IDENTITY" "$FW"
          fi
          codesign --force --options runtime --timestamp \
            --sign "$MACOS_SIGN_IDENTITY" ClaudeWatch.app
          codesign --verify --strict --verbose=2 ClaudeWatch.app

          # --- notarize + staple (skipped if no API key configured) ---
          if [ -n "${AC_API_KEY_P8:-}" ]; then
            KEY="$RUNNER_TEMP/ac_api.p8"
            echo -n "$AC_API_KEY_P8" | base64 -D > "$KEY"
            ditto -c -k --keepParent ClaudeWatch.app "$RUNNER_TEMP/notarize.zip"
            xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
              --key "$KEY" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" --wait
            xcrun stapler staple ClaudeWatch.app
            rm -f "$KEY"
            echo "SIGNED=signed+notarized" >> "$GITHUB_ENV"
          else
            echo "::warning::Signed but NOT notarized (no AC_API_KEY_P8 secret)."
            echo "SIGNED=signed" >> "$GITHUB_ENV"
          fi

      - name: Package + checksum
        run: |
          set -euo pipefail
          ditto -c -k --keepParent ClaudeWatch.app ClaudeWatch.zip
          shasum -a 256 ClaudeWatch.zip | tee ClaudeWatch.zip.sha256

      - name: Sparkle appcast
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail   # NOTE: never `set -x` here — the private key is in env

          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]; then
            echo "::notice::SPARKLE_ED_PRIVATE_KEY not set — skipping appcast (no auto-update feed). See RELEASING.md."
            exit 0
          fi
          SIGN_TOOL="$(find .build -path '*sparkle/Sparkle/bin/sign_update' | head -1)"
          if [ -z "$SIGN_TOOL" ]; then
            echo "::warning::sign_update tool not found under .build — skipping appcast."
            exit 0
          fi

          KEYFILE="$RUNNER_TEMP/sparkle_ed_key"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEYFILE"
          SIG_LINE="$("$SIGN_TOOL" ClaudeWatch.zip --ed-key-file "$KEYFILE")"   # sparkle:edSignature="…" length="…"
          rm -f "$KEYFILE"

          VERSION="${TAG#v}"
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/ClaudeWatch.zip"

          printf '%s\n' \
            '<?xml version="1.0" standalone="yes"?>' \
            '<rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">' \
            '  <channel>' \
            '    <title>ClaudeWatch</title>' \
            '    <item>' \
            "      <title>${VERSION}</title>" \
            "      <sparkle:version>${BUILD_NUMBER}</sparkle:version>" \
            "      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>" \
            '      <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>' \
            "      <enclosure url=\"${DOWNLOAD_URL}\" ${SIG_LINE} type=\"application/octet-stream\" />" \
            '    </item>' \
            '  </channel>' \
            '</rss>' \
            > appcast.xml

          # Publish appcast.xml to the gh-pages branch (served at the Info.plist SUFeedURL).
          WORK="$RUNNER_TEMP/pages"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads "$REMOTE" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$REMOTE" "$WORK"
          else
            git clone --depth 1 "$REMOTE" "$WORK"
            git -C "$WORK" checkout --orphan gh-pages
            git -C "$WORK" rm -rf . >/dev/null 2>&1 || true
          fi
          cp appcast.xml "$WORK/appcast.xml"
          git -C "$WORK" -c user.name=ci -c user.email=ci@users.noreply.github.com add appcast.xml
          git -C "$WORK" -c user.name=ci -c user.email=ci@users.noreply.github.com commit -m "appcast ${TAG}"
          git -C "$WORK" push "$REMOTE" HEAD:gh-pages
          echo "::notice::Published appcast for ${TAG} to gh-pages."

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}     # via env — never inline ${{ }} into the script
        run: |
          set -euo pipefail
          printf '%s\n' \
            "A menu-bar history of the system-touching actions Claude Code runs." \
            "" \
            "- Signing: **${SIGNED:-no}**" \
            "- SHA-256: see the \`ClaudeWatch.zip.sha256\` asset" \
            "- Verify: \`spctl -a -vvv ClaudeWatch.app\`" \
            > release-notes.md
          gh release create "$TAG" \
            ClaudeWatch.zip ClaudeWatch.zip.sha256 \
            --title "ClaudeWatch $TAG" \
            --notes-file release-notes.md

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
